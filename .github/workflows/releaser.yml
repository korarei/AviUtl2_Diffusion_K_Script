name: releaser

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract name and version
      id: extract
      run: |
        $repo = $env:GITHUB_REPOSITORY.Split('/')[-1]
        if ($repo -match 'AviUtl2?_(.+?)(?:_(?:Plugin|Script))?$') { $name = $matches[1] } else { $name = $repo }
        "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

        if ($env:GITHUB_REF_NAME -match '^v(\d+\.\d+\.\d+)') { $version = $matches[1] } else { $version = "0.1.0" }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Build plugin (Release)
      id: build
      run: |
        pip install git+https://github.com/korarei/AviUtl2_Astra.git@v0.5.1

        astra release -v '${{ steps.extract.outputs.version }}'

    - name: Attest
      uses: actions/attest@v4
      with:
        subject-path: 'release/*.zip'

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        name: '${{ steps.extract.outputs.name }}_${{ github.ref_name }}'
        files: 'release/*.zip'
        body_path: 'release/release_notes.md'
